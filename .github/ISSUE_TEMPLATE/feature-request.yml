name: Sugestao de feature
description: Sugira uma melhoria alinhada com a direcao do produto.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        O Radar Local esta evoluindo para um fluxo de prospeccao orientado a vendas para negocios locais.
        Use este template para descrever uma melhoria concreta e por que ela importa.

  - type: textarea
    id: problem
    attributes:
      label: Problema a resolver
      description: Que dor de usuario ou oportunidade perdida voce esta vendo?
      placeholder: Os usuarios conseguem encontrar leads, mas ainda gastam muito tempo decidindo quem abordar primeiro.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Solucao proposta
      description: Descreva a feature, comportamento ou fluxo que voce gostaria de adicionar.
      placeholder: Adicionar uma fila operacional do dia que agrupe leads quentes, follow-ups atrasados e leads com resposta.
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Resultado esperado
      description: Como isso melhoraria conversao, usabilidade ou manutencao?
      placeholder: Isso reduziria a fadiga de decisao e deixaria o produto mais proximo de um sistema operacional comercial.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area principal
      options:
        - Busca e sourcing
        - Scoring de leads
        - Oferta sugerida
        - Detalhe do lead
        - Pipeline e follow-up
        - Demo publica e LP
        - Screenshots e compartilhamento
        - Metricas e ROI
        - Plataforma e infraestrutura
        - Docs
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Contexto extra
      description: Adicione exemplos, referencias ou restricoes de implementacao se isso ajudar.
