name: Relato de bug
description: Reporte um bug reproduzivel no produto ou no fluxo de desenvolvimento.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar um problema. Inclua detalhes suficientes para que outra pessoa consiga reproduzir rapidamente.

  - type: textarea
    id: summary
    attributes:
      label: Resumo
      description: O que esta acontecendo e o que voce esperava que acontecesse?
      placeholder: Quando movo um lead para outra coluna, ele desaparece da lista de resultados de forma inesperada.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Liste os passos exatos para reproduzir o problema.
      placeholder: |
        1. Acesse /pipeline
        2. Arraste um lead de "Novo" para "Abordado"
        3. Volte para /resultados
        4. Observe que...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Area afetada
      description: Qual parte do produto foi afetada?
      placeholder: Busca, resultados, detalhe do lead, pipeline, historico, demo publica, screenshots ou docs.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots ou contexto extra
      description: Cole qualquer informacao que ajude a investigar.
      render: shell

  - type: dropdown
    id: regression
    attributes:
      label: Isso e uma regressao?
      options:
        - Nao sei
        - Sim
        - Nao
    validations:
      required: true
